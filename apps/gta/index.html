  <style>
    @font-face { font-family: 'JetBrains Mono'; src: url('fonts/JetBrainsMono-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url('fonts/JetBrainsMono-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url('fonts/JetBrainsMono-ExtraBold.woff2') format('woff2'); font-weight: 800; font-style: normal; font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 48px; overflow: hidden; }

    @media (max-width: 991.98px) {
      .gta-controls { bottom: 80px; }
    }

    #game { width: 100vw; height: calc(100vh - 48px); display: flex; align-items: center; justify-content: center; }
    .gta-game {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0a; width: 100%; height: 100%; position: relative;
      overflow: hidden; font-family: 'JetBrains Mono', monospace;
    }
    #gta-canvas {
      display: block;
      border: 2px solid rgba(226,0,26,0.3); border-radius: 4px;
      image-rendering: pixelated;
    }
    .gta-controls {
      position: fixed; bottom: 20px; left: 0; right: 0;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 20px; z-index: 100; pointer-events: none;
    }
    .gta-dpad {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      pointer-events: auto; opacity: 0.6;
    }
    .gta-dpad-row { display: flex; gap: 4px; }
    .gta-actions {
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: auto; opacity: 0.6;
    }
    .gta-btn {
      width: 56px; height: 56px; border-radius: 12px;
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .gta-btn:active { background: rgba(226,0,26,0.25); }
    .gta-btn-coffee {
      width: 56px; height: 56px; border-radius: 12px;
      background: rgba(139,105,20,0.3); border: 1.5px solid rgba(139,105,20,0.5);
      color: #ffd600; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .gta-btn-coffee:active { background: rgba(139,105,20,0.5); }
    .gta-btn-talk {
      width: 56px; height: 56px; border-radius: 12px;
      background: rgba(0,61,122,0.3); border: 1.5px solid rgba(0,61,122,0.5);
      color: #80b0e0; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .gta-btn-talk:active { background: rgba(0,61,122,0.5); }
    .gta-kb-hint {
      display: none;
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(226,0,26,0.3);
      border-radius: 8px; padding: 10px 14px; z-index: 100;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: rgba(255,255,255,0.6); line-height: 1.7;
    }
    .gta-kb-hint kbd {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px; padding: 1px 5px; color: #ffd600; font-family: inherit;
    }
    @media (hover: hover) and (pointer: fine) {
      .gta-controls { display: none; }
      .gta-kb-hint { display: block; }
    }
    .gta-intro {
      position: absolute; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; flex-direction: column;
    }
    .gta-intro-text {
      color: #ccc; font-size: clamp(12px, 2.5vw, 18px); text-align: center;
      opacity: 0; transition: opacity 1s;
      font-family: 'JetBrains Mono', monospace;
    }
    .gta-intro-text.show { opacity: 1; }
    .gta-intro-text.hide { opacity: 0; }
    .gta-intro-dramatic {
      color: #fff; font-size: clamp(13px, 2.8vw, 20px); text-align: center;
      font-style: italic; opacity: 0; transition: opacity 1.2s;
      font-family: 'JetBrains Mono', monospace;
      max-width: 80%; line-height: 1.6;
    }
    .gta-intro-dramatic.show { opacity: 1; }
    .gta-intro-dramatic.hide { opacity: 0; }
    .gta-intro-logo {
      color: #e2001a; font-size: clamp(10px, 2vw, 16px); text-transform: uppercase;
      letter-spacing: 4px; opacity: 0; transition: opacity 1s;
      font-family: 'JetBrains Mono', monospace;
    }
    .gta-intro-logo.show { opacity: 1; }
    .gta-intro-logo.hide { opacity: 0; }
    .gta-intro-loader {
      width: min(300px, 60vw); height: 6px; background: #222; border-radius: 3px;
      overflow: hidden; opacity: 0; transition: opacity 0.5s;
    }
    .gta-intro-loader.show { opacity: 1; }
    .gta-intro-loader-bar {
      width: 0%; height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #e2001a, #ffd600);
      transition: width 1.8s ease-in-out;
    }
    .gta-intro-loader-bar.fill { width: 100%; }
    .gta-intro-load-text {
      color: #555; font-size: clamp(9px, 1.5vw, 13px); margin-top: 8px;
      opacity: 0; transition: opacity 0.5s;
      font-family: 'JetBrains Mono', monospace;
    }
    .gta-intro-load-text.show { opacity: 1; }
    .gta-intro-title {
      font-size: clamp(24px, 5vw, 56px); font-weight: 900; text-align: center;
      color: #fff; opacity: 0; transform: scale(3);
      transition: opacity 0.4s, transform 0.4s ease-out;
      font-family: 'JetBrains Mono', monospace;
      text-shadow: 0 0 20px #e2001a, 0 0 40px #e2001a, 0 0 60px #ffd600;
      line-height: 1.2;
    }
    .gta-intro-title.show { opacity: 1; transform: scale(1); }
    .gta-intro-subtitle {
      color: #ffd600; font-size: clamp(10px, 2vw, 16px); margin-top: 8px;
      opacity: 0; transition: opacity 1s;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 2px;
    }
    .gta-intro-subtitle.show { opacity: 1; }
    .gta-intro-prompt {
      color: #666; font-size: clamp(10px, 1.8vw, 14px); margin-top: 24px;
      opacity: 0; transition: opacity 0.5s;
      font-family: 'JetBrains Mono', monospace;
      animation: gta-pulse 1.5s ease-in-out infinite;
    }
    .gta-intro-prompt.show { opacity: 1; }
    @keyframes gta-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .gta-intro-flash {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 11;
    }
    .gta-intro-flash.flash {
      animation: gta-flash 0.6s ease-out;
    }
    @keyframes gta-flash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    .gta-intro.fadeout {
      opacity: 0; transition: opacity 0.5s;
      pointer-events: none;
    }
  </style>

  <div id="game"></div>
  <script>
(function() {
  const container = document.getElementById('game');
  container.innerHTML = `
    <div class="gta-game">
      <canvas id="gta-canvas" width="400" height="400"></canvas>
      <div class="gta-controls">
        <div class="gta-dpad">
          <div class="gta-dpad-row"><button class="gta-btn" data-dir="up">&#9650;</button></div>
          <div class="gta-dpad-row">
            <button class="gta-btn" data-dir="left">&#9664;</button>
            <button class="gta-btn" data-dir="down">&#9660;</button>
            <button class="gta-btn" data-dir="right">&#9654;</button>
          </div>
        </div>
        <div class="gta-actions">
          <button class="gta-btn-coffee" id="gta-coffee-btn">&#9749;</button>
          <button class="gta-btn-talk" id="gta-talk-btn">E</button>
        </div>
      </div>
      <div class="gta-kb-hint" id="gta-kb-hint">
        <kbd>WASD</kbd> / <kbd>Pfeiltasten</kbd> Bewegen<br>
        <kbd>E</kbd> / <kbd>Leertaste</kbd> Sprechen<br>
        <kbd>C</kbd> Kaffee trinken
      </div>
      <div class="gta-intro" id="gta-intro">
        <div class="gta-intro-flash" id="gta-flash"></div>
        <div class="gta-intro-text" id="gta-i-text1">From the creators of Punkt 12 and Bauer sucht Frau...</div>
        <div class="gta-intro-dramatic" id="gta-i-dramatic">In einer Welt voller Einschaltquoten<br>und Werbepausen...</div>
        <div class="gta-intro-logo" id="gta-i-logo">&#9670; Sendezentrum Studios presents &#9670;</div>
        <div class="gta-intro-loader" id="gta-i-loader"><div class="gta-intro-loader-bar" id="gta-i-loader-bar"></div></div>
        <div class="gta-intro-load-text" id="gta-i-load-text">Loading Vice City... Koeln-Deutz</div>
        <div class="gta-intro-title" id="gta-i-title">GRAND<br>THOMAS<br>AUTO 6</div>
        <div class="gta-intro-subtitle" id="gta-i-subtitle">&#8212; Sendezentrum Edition &#8212;</div>
        <div class="gta-intro-prompt" id="gta-i-prompt">Druecke eine Taste</div>
      </div>
    </div>
  `;

  const canvas = document.getElementById('gta-canvas');
  const ctx = canvas.getContext('2d');
  const intro = document.getElementById('gta-intro');

  // --- MAP ---
  // 0=floor 1=wall 2=studio 3=door 4=cafeteria 5=furniture 6=rtl-logo
  const MAP = [
    '11111111111111111111',
    '12222310000031111111',
    '12552310000031444441',
    '12222310060031454541',
    '11131100000031444441',
    '10000000000011131111',
    '10000006000000000001',
    '10000000000000000001',
    '11111100000011111101',
    '15500310000013555101',
    '15000310060013500101',
    '15500310000013505101',
    '11131100000011131101',
    '10000000000000000001',
    '10000006000000060001',
    '10000000000000000001',
    '11111131111111311111',
    '12222200001144444441',
    '12552200601144544441',
    '11111111111111111111'
  ];

  const COLS = 20;
  const ROWS = 20;
  let TILE = 20;
  let SIZE = 12;

  const TILE_COLORS = {
    0: '#c8c8c8', 1: '#404040', 2: '#b0b8c8', 3: '#8B6914',
    4: '#d8d0c0', 5: '#505050', 6: '#e2001a'
  };
  const WALKABLE = new Set([0, 2, 3, 4, 6]);

  // --- RESIZE ---
  function resize() {
    const maxW = window.innerWidth;
    const maxH = window.innerHeight - 48;
    const tileW = Math.floor(maxW / COLS);
    const tileH = Math.floor(maxH / ROWS);
    TILE = Math.min(tileW, tileH);
    SIZE = Math.round(TILE * 0.6);
    canvas.width = TILE * COLS;
    canvas.height = TILE * ROWS;
  }
  resize();
  window.addEventListener('resize', resize);

  function getTile(px, py) {
    const tx = Math.floor(px / TILE);
    const ty = Math.floor(py / TILE);
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return 1;
    return parseInt(MAP[ty][tx]);
  }

  function canMove(x, y, w, h) {
    const px = x * TILE;
    const py = y * TILE;
    const pw = w * TILE;
    const ph = h * TILE;
    return WALKABLE.has(getTile(px, py)) &&
           WALKABLE.has(getTile(px + pw - 1, py)) &&
           WALKABLE.has(getTile(px, py + ph - 1)) &&
           WALKABLE.has(getTile(px + pw - 1, py + ph - 1));
  }

  // --- PLAYER (tile coordinates) ---
  const CHAR_W = 0.6;  // character width in tiles
  const CHAR_H = 0.6;  // character height in tiles
  let player = { x: 7.0, y: 7.0 };
  let speed = 0.08;
  let coffee = 0;
  let coffeeCooldown = 0;
  let coffeeAnim = 0;

  // --- NPCs ---
  const npcs = [
    { x: 3, y: 2, name: 'Mod. Meier', color: '#6a4c93',
      lines: ['Gleich ist Sendezeit!', 'Hat jemand mein Skript gesehen?', 'Ich brauche MEHR Dramatik!'] },
    { x: 7, y: 10, name: 'Kamera Schmidt', color: '#1982c4',
      lines: ['Die Linse ist schmutzig!', 'Steh nicht im Bild!', 'Zoom auf Thomas, JETZT!'] },
    { x: 15, y: 3, name: 'Helga Kantine', color: '#f4845f',
      lines: ['Heute gibt es Currywurst!', 'Kaffee ist alle!', 'Thomas, du schon wieder?'] },
    { x: 14, y: 10, name: 'Praktikant Lukas', color: '#8ac926',
      lines: ['Ich hole Kaffee...', 'Wo ist die Maske?', 'Bin erst seit gestern hier...'] },
    { x: 5, y: 17, name: 'Chef-Red.', color: '#ff595e',
      lines: ['Wir brauchen mehr Quote!', 'Das geht so nicht on air!', 'Wo ist der Teleprompter?!'] },
    { x: 12, y: 7, name: 'Tontechniker', color: '#7b6d8d',
      lines: ['Mikro ist an!', 'Bitte Ruhe im Studio!', 'Ich hoer da ein Brummen...'] },
    { x: 3, y: 14, name: 'Cutter Bernd', color: '#4a7c59',
      lines: ['Schnitt laeuft...', 'Die Szene ist im Kasten.', 'Wer hat meinen Kaffee genommen?'] }
  ];
  let activeBubble = null;
  let bubbleTimer = 0;

  // --- INPUT ---
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // Touch controls
  document.querySelectorAll('.gta-btn').forEach(btn => {
    const setKey = (d, state) => {
      if (d === 'up') keys['ArrowUp'] = state;
      if (d === 'down') keys['ArrowDown'] = state;
      if (d === 'left') keys['ArrowLeft'] = state;
      if (d === 'right') keys['ArrowRight'] = state;
    };
    btn.addEventListener('touchstart', e => { e.preventDefault(); setKey(btn.dataset.dir, true); });
    btn.addEventListener('touchend', e => { e.preventDefault(); setKey(btn.dataset.dir, false); });
    btn.addEventListener('mousedown', e => { setKey(btn.dataset.dir, true); });
    btn.addEventListener('mouseup', e => { setKey(btn.dataset.dir, false); });
  });

  document.getElementById('gta-coffee-btn').addEventListener('click', drinkCoffee);
  document.getElementById('gta-talk-btn').addEventListener('click', interact);

  function drinkCoffee() {
    if (coffeeCooldown > 0) return;
    coffee++;
    coffeeCooldown = 120;
    coffeeAnim = 60;
    if (coffee === 10) speed = 0.12;
  }

  function interact() {
    let nearest = null;
    let minDist = 2.0;
    const cx = player.x + CHAR_W / 2;
    const cy = player.y + CHAR_H / 2;
    npcs.forEach(npc => {
      const nx = npc.x + 0.5;
      const ny = npc.y + 0.5;
      const d = Math.hypot(cx - nx, cy - ny);
      if (d < minDist) { minDist = d; nearest = npc; }
    });
    if (nearest) {
      activeBubble = {
        npc: nearest,
        text: nearest.lines[Math.floor(Math.random() * nearest.lines.length)]
      };
      bubbleTimer = 180;
    }
  }

  document.addEventListener('keydown', e => {
    if (phase !== 'game') return;
    if (e.key === 'c' || e.key === 'C') drinkCoffee();
    if (e.key === 'e' || e.key === 'E' || e.key === ' ') { e.preventDefault(); interact(); }
  });

  // --- COLOR HELPERS ---
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
  }

  function darken(hex, amount) {
    const [r, g, b] = hexToRgb(hex);
    const f = 1 - amount;
    return `rgb(${Math.round(r * f)},${Math.round(g * f)},${Math.round(b * f)})`;
  }

  // --- DRAWING ---
  function drawMap() {
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const t = parseInt(MAP[y][x]);
        const px = x * TILE;
        const py = y * TILE;

        ctx.fillStyle = TILE_COLORS[t];
        ctx.fillRect(px, py, TILE, TILE);

        // Wall bevel effect
        if (t === 1) {
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect(px, py, TILE, 2);
          ctx.fillRect(px, py, 2, TILE);
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.fillRect(px, py + TILE - 2, TILE, 2);
          ctx.fillRect(px + TILE - 2, py, 2, TILE);
        }

        // Door detail
        if (t === 3) {
          ctx.fillStyle = darken('#8B6914', 0.2);
          const inset = Math.max(2, TILE * 0.15);
          ctx.fillRect(px + inset, py + inset, TILE - inset * 2, TILE - inset * 2);
          ctx.fillStyle = '#ffd600';
          const knobR = Math.max(1, TILE * 0.06);
          ctx.beginPath();
          ctx.arc(px + TILE * 0.7, py + TILE * 0.5, knobR, 0, Math.PI * 2);
          ctx.fill();
        }

        // RTL logo tile
        if (t === 6) {
          ctx.fillStyle = '#fff';
          const fontSize = Math.max(6, Math.round(TILE * 0.4));
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('RTL', px + TILE / 2, py + TILE / 2);
        }

        // Furniture detail
        if (t === 5) {
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
          ctx.strokeStyle = 'rgba(255,255,255,0.1)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px + 2, py + 2, TILE - 4, TILE - 4);
        }

        // Floor grid lines
        if (t === 0 || t === 2 || t === 4) {
          ctx.strokeStyle = 'rgba(0,0,0,0.06)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(px, py, TILE, TILE);
        }

        // Studio floor pattern
        if (t === 2) {
          ctx.strokeStyle = 'rgba(0,0,0,0.04)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px + TILE, py + TILE);
          ctx.stroke();
        }

        // Cafeteria checkerboard
        if (t === 4 && (x + y) % 2 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.04)';
          ctx.fillRect(px, py, TILE, TILE);
        }
      }
    }
  }

  function drawCharacter(tileX, tileY, bodyColor, name, nameColor) {
    const px = tileX * TILE;
    const py = tileY * TILE;
    const cx = px + TILE * 0.5;

    const charW = TILE * 0.5;
    const charH = TILE * 0.85;
    const startY = py + (TILE - charH) * 0.5;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(cx, py + TILE * 0.92, charW * 0.5, TILE * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    const legW = charW * 0.3;
    const legH = charH * 0.28;
    const legGap = charW * 0.12;
    const legY = startY + charH - legH;
    ctx.fillStyle = darken(bodyColor, 0.35);
    ctx.fillRect(cx - legGap / 2 - legW, legY, legW, legH);
    ctx.fillRect(cx + legGap / 2, legY, legW, legH);

    // Torso
    const torsoH = charH * 0.38;
    const torsoY = startY + charH * 0.28;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx - charW / 2, torsoY, charW, torsoH);

    // Arms (small rectangles on sides)
    const armW = charW * 0.2;
    const armH = torsoH * 0.7;
    const armY = torsoY + torsoH * 0.1;
    ctx.fillStyle = darken(bodyColor, 0.15);
    ctx.fillRect(cx - charW / 2 - armW, armY, armW, armH);
    ctx.fillRect(cx + charW / 2, armY, armW, armH);

    // Head
    const headR = charW * 0.38;
    const headY = startY + headR + charH * 0.02;
    ctx.fillStyle = '#e8c090';
    ctx.beginPath();
    ctx.arc(cx, headY, headR, 0, Math.PI * 2);
    ctx.fill();

    // Hair (top half-circle in character color)
    ctx.fillStyle = darken(bodyColor, 0.1);
    ctx.beginPath();
    ctx.arc(cx, headY - headR * 0.15, headR * 0.85, Math.PI, 0);
    ctx.fill();

    // Name label
    const fontSize = Math.max(7, Math.round(TILE * 0.32));
    ctx.fillStyle = nameColor || '#000';
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(name, cx, startY - fontSize * 0.15);
  }

  function drawNPCs() {
    npcs.forEach(npc => {
      drawCharacter(npc.x, npc.y, npc.color, npc.name, '#000');
    });
  }

  function drawPlayer() {
    drawCharacter(player.x, player.y, '#003d7a', 'Thomas', '#ffd600');
  }

  function drawHUD() {
    const hudH = Math.max(16, Math.round(TILE * 0.8));
    const fontSize = Math.max(9, Math.round(TILE * 0.4));
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, hudH);
    ctx.fillStyle = '#e2001a';
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('GRAND THOMAS AUTO 6', Math.round(TILE * 0.2), hudH / 2);
    ctx.fillStyle = '#ffd600';
    ctx.textAlign = 'right';
    ctx.fillText('Kaffee: ' + coffee, canvas.width - Math.round(TILE * 0.2), hudH / 2);
    if (coffee >= 10) {
      ctx.fillStyle = '#4ade80';
      const boostX = canvas.width - Math.round(TILE * 4.5);
      ctx.fillText('KOFFEIN-BOOST!', boostX, hudH / 2);
    }
  }

  function drawBubble() {
    if (!activeBubble || bubbleTimer <= 0) return;
    const npc = activeBubble.npc;
    const bx = npc.x * TILE + TILE / 2;
    const by = npc.y * TILE - Math.round(TILE * 0.6);
    const text = activeBubble.text;
    const fontSize = Math.max(8, Math.round(TILE * 0.38));
    ctx.font = `${fontSize}px sans-serif`;
    const tw = ctx.measureText(text).width + Math.round(TILE * 0.5);
    const bw = Math.max(tw, TILE * 2);
    const bh = fontSize + Math.round(TILE * 0.4);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(bx - bw / 2, by - bh, bw, bh, Math.round(TILE * 0.15));
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, bx, by - bh / 2);
  }

  function drawCoffeeAnim() {
    if (coffeeAnim <= 0) return;
    const px = player.x * TILE;
    const py = player.y * TILE;
    const ax = px + TILE * 0.75;
    const ay = py + TILE * 0.2;
    const cupW = Math.max(4, TILE * 0.25);
    const cupH = Math.max(5, TILE * 0.35);
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(ax, ay, cupW, cupH);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = Math.max(1, TILE * 0.04);
    ctx.beginPath();
    ctx.arc(ax + cupW + TILE * 0.1, ay + cupH * 0.5, cupH * 0.25, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const steamFontSize = Math.max(6, Math.round(TILE * 0.35));
    ctx.font = `${steamFontSize}px sans-serif`;
    ctx.textAlign = 'left';
    const steamY = ay - TILE * 0.15 - (60 - coffeeAnim) * TILE * 0.008;
    ctx.fillText('~', ax + cupW * 0.1, steamY);
  }

  // --- GAME LOOP ---
  let phase = 'intro';

  function updatePlayer() {
    let dx = 0, dy = 0;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= speed;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += speed;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= speed;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += speed;

    if (dx !== 0 && canMove(player.x + dx, player.y, CHAR_W, CHAR_H)) player.x += dx;
    if (dy !== 0 && canMove(player.x, player.y + dy, CHAR_W, CHAR_H)) player.y += dy;

    if (coffeeCooldown > 0) coffeeCooldown--;
    if (coffeeAnim > 0) coffeeAnim--;
    if (bubbleTimer > 0) bubbleTimer--;
  }

  function gameLoop() {
    if (phase !== 'game') return;
    updatePlayer();
    drawMap();
    drawNPCs();
    drawPlayer();
    drawCoffeeAnim();
    drawBubble();
    drawHUD();
    requestAnimationFrame(gameLoop);
  }

  // --- INTRO SEQUENCE ---
  function runIntro() {
    const els = {
      t1: document.getElementById('gta-i-text1'),
      dra: document.getElementById('gta-i-dramatic'),
      logo: document.getElementById('gta-i-logo'),
      loader: document.getElementById('gta-i-loader'),
      loaderBar: document.getElementById('gta-i-loader-bar'),
      loadText: document.getElementById('gta-i-load-text'),
      title: document.getElementById('gta-i-title'),
      subtitle: document.getElementById('gta-i-subtitle'),
      prompt: document.getElementById('gta-i-prompt'),
      flash: document.getElementById('gta-flash')
    };

    Object.values(els).forEach(el => { if (el) el.classList.remove('show'); });

    let canSkip = false;

    setTimeout(() => { els.t1.classList.add('show'); }, 300);
    setTimeout(() => { els.t1.classList.remove('show'); els.t1.classList.add('hide'); }, 2000);
    setTimeout(() => { els.dra.classList.add('show'); }, 2500);
    setTimeout(() => { els.dra.classList.remove('show'); els.dra.classList.add('hide'); }, 4500);
    setTimeout(() => { els.logo.classList.add('show'); }, 5000);
    setTimeout(() => { els.logo.classList.remove('show'); els.logo.classList.add('hide'); }, 6800);
    setTimeout(() => { els.loader.classList.add('show'); els.loadText.classList.add('show'); }, 7000);
    setTimeout(() => { els.loaderBar.classList.add('fill'); }, 7200);
    setTimeout(() => {
      els.loader.style.display = 'none';
      els.loadText.style.display = 'none';
      els.flash.classList.add('flash');
      setTimeout(() => { els.title.classList.add('show'); }, 200);
      setTimeout(() => { els.subtitle.classList.add('show'); }, 1200);
      setTimeout(() => { els.prompt.classList.add('show'); canSkip = true; }, 2000);
    }, 9200);

    function startGame() {
      if (!canSkip) return;
      intro.classList.add('fadeout');
      setTimeout(() => {
        intro.style.display = 'none';
        phase = 'game';
        gameLoop();
      }, 500);
    }

    document.addEventListener('keydown', function handler(e) {
      if (canSkip) { startGame(); document.removeEventListener('keydown', handler); }
    });
    intro.addEventListener('click', () => { if (canSkip) startGame(); });
  }

  runIntro();
})();
