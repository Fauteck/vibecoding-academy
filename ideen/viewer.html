<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idee - Vibecoding Academy</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #222; }

    /* ── Desktop Navbar (>992px) ─────────────────────── */
    .site-navbar {
      display: none;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      position: sticky; top: 0; z-index: 1030;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      align-items: center; justify-content: space-between;
      padding: 0.5rem 1.5rem;
    }
    .site-navbar-brand {
      color: #fff; text-decoration: none; font-size: 1.3rem; font-weight: bold;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .site-navbar-links { display: flex; align-items: center; gap: 0.25rem; }
    .site-navbar-link {
      color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.875rem;
      padding: 0.4rem 0.8rem; border-radius: 6px; transition: background 0.2s, color 0.2s;
    }
    .site-navbar-link:hover, .site-navbar-link.active {
      color: #fff; background: rgba(255,255,255,0.15);
    }

    /* ── Mobile Top Bar (<=992px) ────────────────────── */
    .mobile-topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; z-index: 1030;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .mobile-topbar-brand {
      color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: bold;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .mobile-topbar-btn {
      color: rgba(255,255,255,0.85); text-decoration: none; font-size: 1.1rem;
      padding: 0.4rem; transition: color 0.2s;
    }
    .mobile-topbar-btn:hover { color: #fff; }

    /* ── Mobile Bottom Nav (<=992px) ─────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
      background: #2c3e50; display: flex; justify-content: space-around; align-items: center;
      z-index: 1030; box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }
    .bottom-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
      color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.65rem;
      padding: 0.3rem 0.6rem; transition: color 0.2s;
    }
    .bottom-nav-item i { font-size: 1.15rem; }
    .bottom-nav-item:hover, .bottom-nav-item.active { color: #fff; }
    .bottom-nav-item.active i { color: #3498db; }

    /* ── Responsive ──────────────────────────────────── */
    @media (min-width: 992px) {
      .site-navbar { display: flex; }
      .mobile-topbar, .bottom-nav { display: none !important; }
    }
    @media (max-width: 991.98px) {
      body { padding-top: 56px; padding-bottom: 60px; }
    }
    #content { max-width: 800px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); line-height: 1.7; }
    #content h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    #content h2 { font-size: 1.4rem; margin-top: 1.8rem; margin-bottom: 0.6rem; color: #34495e; }
    #content h3 { font-size: 1.15rem; margin-top: 1.4rem; margin-bottom: 0.5rem; color: #34495e; }
    #content p { margin-bottom: 0.8rem; }
    #content ul, #content ol { margin-bottom: 0.8rem; padding-left: 1.5rem; }
    #content li { margin-bottom: 0.3rem; }
    #content code { background: #f0f2f5; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; font-family: 'Consolas', 'Monaco', monospace; }
    #content pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
    #content pre code { background: none; padding: 0; color: inherit; font-size: 0.85rem; }
    #content strong { color: #2c3e50; }
    #content table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
    #content th, #content td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    #content th { background: #f0f2f5; font-weight: 600; }
    #content hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .loading { text-align: center; padding: 3rem; color: #888; font-size: 1.1rem; }
    .error { text-align: center; padding: 3rem; color: #e74c3c; }
    .idea-nav { max-width: 800px; margin: 1rem auto 2rem; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .idea-nav a { display: inline-flex; align-items: center; gap: 0.4rem; color: #3498db; text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #dde; transition: background 0.2s; }
    .idea-nav a:hover { background: #eef3f8; }
    .idea-nav .disabled { pointer-events: none; opacity: 0.3; }
    .idea-nav .counter { color: #888; font-size: 0.8rem; }
    @media (max-width: 600px) {
      #content { margin: 1rem; padding: 1.2rem; }
      .idea-nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <!-- Desktop Navbar (>992px) -->
  <nav class="site-navbar">
    <a class="site-navbar-brand" href="../">
      <i class="fas fa-code"></i> Vibecoding Academy
    </a>
    <div class="site-navbar-links">
      <a class="site-navbar-link active" href="../">Home</a>
      <a class="site-navbar-link" href="../pong/">Pong</a>
      <a class="site-navbar-link" href="../gta/">GTA</a>
      <a class="site-navbar-link" href="../handout/">Handout</a>
      <a class="site-navbar-link" href="https://github.com/Fauteck/vibecoding-academy" target="_blank" rel="noopener">
        <i class="fab fa-github"></i> GitHub
      </a>
    </div>
  </nav>

  <!-- Mobile Top Bar (<=992px) -->
  <div class="mobile-topbar">
    <a class="mobile-topbar-brand" href="../">
      <i class="fas fa-code"></i> Vibecoding Academy
    </a>
    <a href="https://github.com/Fauteck/vibecoding-academy"
       class="mobile-topbar-btn" target="_blank" rel="noopener" aria-label="GitHub">
      <i class="fab fa-github"></i>
    </a>
  </div>

  <!-- Mobile Bottom Navigation (<=992px) -->
  <nav class="bottom-nav">
    <a class="bottom-nav-item active" href="../">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a class="bottom-nav-item" href="../pong/">
      <i class="fas fa-table-tennis-paddle-ball"></i>
      <span>Pong</span>
    </a>
    <a class="bottom-nav-item" href="../gta/">
      <i class="fas fa-car"></i>
      <span>GTA</span>
    </a>
    <a class="bottom-nav-item" href="../handout/">
      <i class="fas fa-file-alt"></i>
      <span>Handout</span>
    </a>
  </nav>
  <div id="content"><div class="loading">Laden...</div></div>
  <nav id="idea-nav" class="idea-nav" style="display:none;"></nav>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var ideas = [
        { file: 'flappybird.md', title: 'Flappy Bird', emoji: '\uD83D\uDC26' },
        { file: 'memory.md', title: 'Memory', emoji: '\uD83C\uDCCF' },
        { file: 'minesweeper.md', title: 'Minesweeper', emoji: '\uD83D\uDCA3' },
        { file: 'pong.md', title: 'Pong', emoji: '\uD83C\uDFD3' },
        { file: 'snake.md', title: 'Snake', emoji: '\uD83D\uDC0D' },
        { file: 'solitaire.md', title: 'Solitär', emoji: '\uD83C\uDCA1' },
        { file: 'sudoku.md', title: 'Sudoku', emoji: '\uD83D\uDD22' },
        { file: 'tetris.md', title: 'Tetris', emoji: '\uD83E\uDDF1' },
        { file: 'tictactoe.md', title: 'Tic-Tac-Toe', emoji: '\u274C' }
      ];

      var params = new URLSearchParams(window.location.search);
      var file = params.get('file');
      var el = document.getElementById('content');

      if (!file || !file.endsWith('.md') || file.includes('..') || file.includes('/')) {
        el.innerHTML = '<div class="error">Ungültige oder fehlende Datei.</div>';
        return;
      }

      // Build prev/next navigation
      var idx = ideas.findIndex(function(i) { return i.file === file; });
      if (idx !== -1) {
        var nav = document.getElementById('idea-nav');
        var prev = idx > 0 ? ideas[idx - 1] : null;
        var next = idx < ideas.length - 1 ? ideas[idx + 1] : null;

        var html = '';
        if (prev) {
          html += '<a href="viewer.html?file=' + prev.file + '">\u2190 ' + prev.emoji + ' ' + prev.title + '</a>';
        } else {
          html += '<a class="disabled" href="#">\u2190 Vorherige</a>';
        }
        html += '<span class="counter">' + (idx + 1) + ' / ' + ideas.length + '</span>';
        if (next) {
          html += '<a href="viewer.html?file=' + next.file + '">' + next.emoji + ' ' + next.title + ' \u2192</a>';
        } else {
          html += '<a class="disabled" href="#">Nächste \u2192</a>';
        }
        nav.innerHTML = html;
        nav.style.display = 'flex';
      }

      fetch(file)
        .then(function(res) {
          if (!res.ok) throw new Error('Nicht gefunden');
          return res.text();
        })
        .then(function(text) {
          el.innerHTML = marked.parse(text);
          var h1 = el.querySelector('h1');
          if (h1) document.title = h1.textContent + ' - Vibecoding Academy';
        })
        .catch(function() {
          el.innerHTML = '<div class="error">Die Datei konnte nicht geladen werden.</div>';
        });
    })();
  </script>
</body>
</html>
