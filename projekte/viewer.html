  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"
          integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR"
          crossorigin="anonymous"></script>
  <script>
    (function() {
      var ideas = [
        { file: 'flappybird.md', title: 'Flappy Bird', emoji: '\uD83D\uDC26' },
        { file: 'memory.md', title: 'Memory', emoji: '\uD83C\uDCCF' },
        { file: 'minesweeper.md', title: 'Minesweeper', emoji: '\uD83D\uDCA3' },
        { file: 'pong.md', title: 'Pong', emoji: '\uD83C\uDFD3' },
        { file: 'snake.md', title: 'Snake', emoji: '\uD83D\uDC0D' },
        { file: 'solitaire.md', title: 'Solitär', emoji: '\uD83C\uDCA1' },
        { file: 'sudoku.md', title: 'Sudoku', emoji: '\uD83D\uDD22' },
        { file: 'tetris.md', title: 'Tetris', emoji: '\uD83E\uDDF1' },
        { file: 'tictactoe.md', title: 'Tic-Tac-Toe', emoji: '\u274C' }
      ];

      var params = new URLSearchParams(window.location.search);
      var file = params.get('file');
      var el = document.getElementById('content');

      if (!file || !file.endsWith('.md') || file.includes('..') || file.includes('/')) {
        el.innerHTML = '<div class="error">Ungültige oder fehlende Datei.</div>';
        return;
      }

      // Build prev/next navigation
      var idx = ideas.findIndex(function(i) { return i.file === file; });
      if (idx !== -1) {
        var nav = document.getElementById('idea-nav');
        var navTop = document.getElementById('idea-nav-top');
        var prev = idx > 0 ? ideas[idx - 1] : null;
        var next = idx < ideas.length - 1 ? ideas[idx + 1] : null;

        var html = '';
        if (prev) {
          html += '<a href="viewer.html?file=' + prev.file + '">\u2190 ' + prev.emoji + ' ' + prev.title + '</a>';
        } else {
          html += '<a class="disabled" href="#">\u2190 Vorherige</a>';
        }
        html += '<span class="counter">' + (idx + 1) + ' / ' + ideas.length + '</span>';
        if (next) {
          html += '<a href="viewer.html?file=' + next.file + '">' + next.emoji + ' ' + next.title + ' \u2192</a>';
        } else {
          html += '<a class="disabled" href="#">Nächste \u2192</a>';
        }
        nav.innerHTML = html;
        nav.style.display = 'flex';
        navTop.innerHTML = html;
        navTop.style.display = 'flex';
      }

      fetch(file)
        .then(function(res) {
          if (!res.ok) throw new Error('Nicht gefunden');
          return res.text();
        })
        .then(function(text) {
          el.innerHTML = marked.parse(text);
          var h1 = el.querySelector('h1');
          if (h1) document.title = h1.textContent + ' - Vibecoding Academy';
        })
        .catch(function() {
          el.innerHTML = '<div class="error">Die Datei konnte nicht geladen werden.</div>';
        });
    })();
  </script>
